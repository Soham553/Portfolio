# Gitleaks

name: Secreat Leak Scan

on:
    workflow_call:
      

jobs:
  
    Secreat-Leak-Scan:

        runs-on: ubuntu-latest

        steps:
            
            - name: checkout
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: gitleak Scan
              uses: gitleaks/gitleaks-action@v2
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

