name: Portfolio

on:
  workflow_dispatch: 

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  
  deploy:

    runs-on: ubuntu-latest

    steps:
      
      - name: checkout code
        uses: actions/chekout@4

      - name: setup Github pages
        uses: actions/configure-page@4

      - name: upload static files
        uses: actions/upload-pages-artifact@v4

      - name: deploy to Github pages
        uses: actions/deploy-pages@4